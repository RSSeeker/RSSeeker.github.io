<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RS_Seeker · 个人主页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e0e11;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #e5e5e5;
      overflow: hidden;
      transition: background 0.6s ease, color 0.6s ease;
    }

    body.light {
      background: #f4f5f7;
      color: #1a1a2e;
    }

    .theme-toggle {
      position: fixed;
      top: 18px;
      right: 22px;
      z-index: 10;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .theme-toggle:hover {
      transform: rotate(20deg) scale(1.1);
    }
    body.light .theme-toggle {
      background: rgba(0,0,0,0.05);
      color: #333;
      border-color: rgba(0,0,0,0.1);
    }

    .scene {
      perspective: 1200px;
      z-index: 1;
    }

    .card {
      position: relative;
      width: 420px;
      max-width: 92%;
      padding: 52px 44px 40px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      text-align: center;
      transform-style: preserve-3d;
      transition: transform 0.15s ease-out, box-shadow 0.3s;
      box-shadow: 0 10px 40px rgba(0,0,0,0.45);
    }
    body.light .card {
      background: rgba(255,255,255,0.85);
      border-color: rgba(0,0,0,0.08);
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.2);
      margin-bottom: 22px;
      animation: float 5s ease-in-out infinite;
      transform: translateZ(40px);
    }
    .scene:hover .avatar {
      animation-play-state: paused;
    }
    body.light .avatar {
      border-color: rgba(0,0,0,0.15);
    }
    @keyframes float {
      0%,100% { transform: translateY(0) translateZ(40px); }
      50% { transform: translateY(-8px) translateZ(40px); }
    }

    .name {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 6px;
      transform: translateZ(30px);
    }

    .tagline {
      font-size: 14px;
      color: #888;
      letter-spacing: 1px;
      margin-bottom: 18px;
      transform: translateZ(20px);
    }
    body.light .tagline {
      color: #666;
    }

    /* ✅ 新增 greeting 样式 */
    .greeting {
      font-size: 15px;
      color: #bbb;
      margin-bottom: 28px;
      transform: translateZ(18px);
    }
    body.light .greeting {
      color: #555;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .links a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 22px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #e5e5e5;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s ease;
      transform: translateZ(10px);
    }
    body.light .links a {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.1);
      color: #333;
    }

    .links a:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-3px) translateZ(14px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    .links a svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .footer {
      margin-top: 36px;
      font-size: 12px;
      color: #555;
      letter-spacing: 0.5px;
    }
    body.light .footer {
      color: #999;
    }
  </style>
</head>
<body>

<button class="theme-toggle" id="themeBtn">🌙</button>

<div class="scene" id="scene">
  <div class="card" id="card">
    <img
      class="avatar"
      src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAEXNbZqVnn1vgXvsTqKVZkuEYQ4iiwHjQAC0yMAAkvwuVanYLoFCvHqtT0E.png"
      alt="avatar"
    >

    <div class="name">RS_Seeker</div>
    <div class="tagline">探索者 · 开发者</div>

    <!-- ✅ 新增 -->
    <div class="greeting">你好，我是 RS_Seeker！</div>

    <div class="links">
      <a href="https://github.com/RSSeeker" target="_blank" rel="noopener">
        <svg viewBox="0 0 16 16">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
            0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15
            -.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87
            .51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12
            0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82
            2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65
            3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013
            8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        GitHub
      </a>
    </div>

    <div class="footer">
      © 2026 RS_Seeker · Powered by GitHub Pages
    </div>
  </div>
</div>

<script>
  const themeBtn = document.getElementById("themeBtn");
  themeBtn.addEventListener("click", () => {
    document.body.classList.toggle("light");
    themeBtn.textContent = document.body.classList.contains("light") ? "☀️" : "🌙";
  });

  const card = document.getElementById("card");
  const scene = document.getElementById("scene");

  scene.addEventListener("mousemove", (e) => {
    const rect = scene.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width - 0.5;
    const y = (e.clientY - rect.top) / rect.height - 0.5;

    card.style.transform = `
      rotateY(${x * 14}deg)
      rotateX(${-y * 10}deg)
    `;
  });

  scene.addEventListener("mouseleave", () => {
    card.style.transform = "rotateY(0deg) rotateX(0deg)";
  });
</script>

</body>
</html>
