// ============================================================
//  混淆矩阵
// ============================================================

function computeConfusionMatrix(net, testData, networkType, activation, numClasses) {
  // 对每个测试样本做预测
  const predictions = [];
  const actuals = [];

  for (const sample of testData) {
    const x = sample[0], y = sample[1];
    forward(net, x, activation, false, networkType, null);
    const outputLayer = net[net.length - 1];

    // 预测类别
    let pred = 0, maxP = outputLayer[0].a;
    for (let n = 1; n < outputLayer.length; n++) {
      if (outputLayer[n].a > maxP) { maxP = outputLayer[n].a; pred = n; }
    }

    // 实际类别
    let actual = 0;
    for (let n = 1; n < y.length; n++) {
      if (y[n] > y[actual]) actual = n;
    }

    predictions.push(pred);
    actuals.push(actual);
  }

  // 构建混淆矩阵
  const matrix = Array.from({ length: numClasses }, () => new Array(numClasses).fill(0));
  for (let i = 0; i < actuals.length; i++) {
    matrix[actuals[i]][predictions[i]]++;
  }

  return { matrix, predictions, actuals };
}

function renderConfusionMatrix(matrix, numClasses) {
  const wrap = document.getElementById("confusionMatrixWrap");
  const statsEl = document.getElementById("confusionStats");

  // 计算统计量
  let total = 0, correct = 0;
  for (let i = 0; i < numClasses; i++) {
    for (let j = 0; j < numClasses; j++) {
      total += matrix[i][j];
      if (i === j) correct += matrix[i][j];
    }
  }
  const overallAcc = total > 0 ? (correct / total * 100) : 0;

  // 每类的精确率和召回率
  const perClass = [];
  for (let c = 0; c < numClasses; c++) {
    let tp = matrix[c][c];
    let predictedCount = 0;
    let actualCount = 0;
    for (let i = 0; i < numClasses; i++) {
      predictedCount += matrix[i][c];
      actualCount += matrix[c][i];
    }
    const precision = predictedCount > 0 ? (tp / predictedCount * 100) : 0;
    const recall = actualCount > 0 ? (tp / actualCount * 100) : 0;
    const f1 = (precision + recall) > 0 ? (2 * precision * recall / (precision + recall)) : 0;
    perClass.push({ precision, recall, f1, support: actualCount });
  }

  // 构建 HTML 表格
  let html = `<table class="confusion-table"><thead><tr><th></th>`;
  for (let j = 0; j < numClasses; j++) {
    html += `<th>Pred ${j}</th>`;
  }
  html += `<th class="blank"></th><th>Precision</th></tr></thead><tbody>`;

  for (let i = 0; i < numClasses; i++) {
    html += `<tr><th>Actual ${i}</th>`;
    for (let j = 0; j < numClasses; j++) {
      const val = matrix[i][j];
      const cls = i === j ? "correct" : (val > 0 ? "incorrect" : "blank");
      html += `<td class="${cls}">${val}</td>`;
    }
    html += `<td class="blank"></td><td>${(perClass[i].precision).toFixed(1)}%</td></tr>`;
  }

  // 召回率行
  html += `<tr><th></th>`;
  for (let j = 0; j < numClasses; j++) {
    html += `<th></th>`;
  }
  html += `<th class="blank"></th><th></th></tr>`;

  html += `<tr><th>Recall</th>`;
  for (let j = 0; j < numClasses; j++) {
    html += `<td>${(perClass[j].recall).toFixed(1)}%</td>`;
  }
  html += `<th class="blank"></th><th></th></tr>`;

  html += `<tr><th>F1-Score</th>`;
  for (let j = 0; j < numClasses; j++) {
    html += `<td>${(perClass[j].f1).toFixed(1)}%</td>`;
  }
  html += `<th class="blank"></th><th></th></tr>`;

  html += `</tbody></table>`;
  wrap.innerHTML = html;

  // 统计摘要
  let statsHtml = `
    <div class="stat-item">总样本数: <span class="stat-value">${total}</span></div>
    <div class="stat-item">正确预测: <span class="stat-value">${correct}</span></div>
    <div class="stat-item">总体准确率: <span class="stat-value">${overallAcc.toFixed(1)}%</span></div>
  `;
  // 加权平均 F1
  let totalF1 = 0, totalSupport = 0;
  for (let c = 0; c < numClasses; c++) {
    totalF1 += perClass[c].f1 * perClass[c].support;
    totalSupport += perClass[c].support;
  }
  const macroF1 = totalSupport > 0 ? (totalF1 / totalSupport) : 0;
  statsHtml += `<div class="stat-item">加权平均 F1: <span class="stat-value">${macroF1.toFixed(1)}%</span></div>`;
  statsEl.innerHTML = statsHtml;
}

// ============================================================
//  决策边界可视化 (2D 分类)
// ============================================================

const decisionCanvas = document.getElementById("decisionCanvas");
const ctxDecision = decisionCanvas.getContext("2d");

// 保存当前决策边界的参数，用于 resize 后重绘
let decisionBoundaryData = null;

function resizeDecisionCanvas() {
  const width = decisionCanvas.offsetWidth;
  if (width <= 0) return;
  decisionCanvas.width = width;
  // 响应式画布高度：手机 250-280，平板 280-340，桌面 400+
  if (width <= 480)       decisionCanvas.height = Math.max(250, width * 0.7);
  else if (width <= 768)  decisionCanvas.height = Math.max(280, width * 0.72);
  else                    decisionCanvas.height = Math.max(400, width * 0.75);
}

// 窗口 resize 后需要重绘决策边界
window.addEventListener("resize", () => {
  resizeDecisionCanvas();
  if (decisionBoundaryData) {
    const d = decisionBoundaryData;
    drawDecisionBoundary(d.net, d.trainData, d.testData, d.activation, d.networkType, d.numClasses);
  }
});

// 手机端 visualViewport 变化时也重绘（地址栏收起/弹出、软键盘等）
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", () => {
    resizeDecisionCanvas();
    if (decisionBoundaryData) {
      const d = decisionBoundaryData;
      drawDecisionBoundary(d.net, d.trainData, d.testData, d.activation, d.networkType, d.numClasses);
    }
  });
}

// 为分类任务生成颜色
function getClassColor(classIdx, alpha) {
  const colors = [
    `rgba(255, 59, 48, ${alpha})`,     // 红
    `rgba(52, 199, 89, ${alpha})`,     // 绿
    `rgba(0, 122, 255, ${alpha})`,     // 蓝
    `rgba(255, 149, 0, ${alpha})`,     // 橙
    `rgba(175, 82, 222, ${alpha})`,    // 紫
    `rgba(90, 200, 250, ${alpha})`,    // 青
    `rgba(255, 214, 10, ${alpha})`,    // 黄
    `rgba(255, 55, 95, ${alpha})`,     // 粉
  ];
  return colors[classIdx % colors.length];
}

function drawDecisionBoundary(net, trainData, testData, activation, networkType, numClasses) {
  resizeDecisionCanvas();
  const W = decisionCanvas.width;
  const H = decisionCanvas.height;
  if (W <= 0 || H <= 0) return;
  const minCellSize = W <= 480 ? 6 : 4;
  const maxCells = W <= 480 ? 120 : (W <= 768 ? 160 : 220);
  const resolutionX = Math.min(maxCells, Math.max(60, Math.ceil(W / minCellSize)));
  const resolutionY = Math.min(maxCells, Math.max(60, Math.ceil(H / minCellSize)));

  // 计算数据范围（含测试集）
  const xCoords = [];
  const yCoords = [];
  if (trainData) {
    trainData.forEach(d => { if (d[0] && d[0].length >= 2) { xCoords.push(d[0][0]); yCoords.push(d[0][1]); } });
  }
  if (testData) {
    testData.forEach(d => { if (d[0] && d[0].length >= 2) { xCoords.push(d[0][0]); yCoords.push(d[0][1]); } });
  }
  if (xCoords.length === 0 || yCoords.length === 0) return;

  const xMin = Math.min(...xCoords);
  const xMax = Math.max(...xCoords);
  const yMin = Math.min(...yCoords);
  const yMax = Math.max(...yCoords);
  const marginX = (xMax - xMin) * 0.15 || 1;
  const marginY = (yMax - yMin) * 0.15 || 1;

  const stepX = W / resolutionX;
  const stepY = H / resolutionY;

  ctxDecision.clearRect(0, 0, W, H);

  for (let ry = 0; ry < resolutionY; ry++) {
    for (let rx = 0; rx < resolutionX; rx++) {
      const x = xMin - marginX + (rx / (resolutionX - 1)) * (xMax - xMin + 2 * marginX);
      const y = yMin - marginY + ((resolutionY - 1 - ry) / (resolutionY - 1)) * (yMax - yMin + 2 * marginY);

      forward(net, [x, y], activation, false, networkType, null);
      const outputLayer = net[net.length - 1];

      let bestClass = 0;
      let maxP = outputLayer[0].a;
      for (let n = 1; n < outputLayer.length; n++) {
        if (outputLayer[n].a > maxP) { maxP = outputLayer[n].a; bestClass = n; }
      }

      ctxDecision.fillStyle = getClassColor(bestClass, 0.22);
      ctxDecision.fillRect(Math.round(rx * stepX), Math.round(ry * stepY), Math.ceil(stepX), Math.ceil(stepY));
    }
  }

  // 绘制训练数据点
  const drawPoint = (x, y, classIdx, isTest) => {
    const px = ((x - (xMin - marginX)) / (xMax - xMin + 2 * marginX)) * W;
    const py = H - ((y - (yMin - marginY)) / (yMax - yMin + 2 * marginY)) * H;
    ctxDecision.beginPath();
    ctxDecision.arc(px, py, isTest ? 5 : 6, 0, Math.PI * 2);
    if (isTest) {
      ctxDecision.strokeStyle = getClassColor(classIdx, 1.0);
      ctxDecision.lineWidth = 2;
      ctxDecision.stroke();
    } else {
      ctxDecision.fillStyle = getClassColor(classIdx, 1.0);
      ctxDecision.fill();
      ctxDecision.strokeStyle = isLightTheme() ? "rgba(0,0,0,0.6)" : "rgba(255,255,255,0.8)";
      ctxDecision.lineWidth = 2;
      ctxDecision.stroke();
    }
  };

  // 绘制训练集
  if (trainData) {
    trainData.forEach(d => {
      if (!d[0] || d[0].length < 2) return;
      const x = d[0][0], y = d[0][1];
      const label = d[1];
      let cls = 0;
      for (let n = 1; n < label.length; n++) {
        if (label[n] > label[cls]) cls = n;
      }
      drawPoint(x, y, cls, false);
    });
  }

  // 绘制测试集
  if (testData) {
    testData.forEach(d => {
      if (!d[0] || d[0].length < 2) return;
      const x = d[0][0], y = d[0][1];
      const label = d[1];
      let cls = 0;
      for (let n = 1; n < label.length; n++) {
        if (label[n] > label[cls]) cls = n;
      }
      drawPoint(x, y, cls, true);
    });
  }

  // 图例
  const legendX = 12, legendY = 12;
  ctxDecision.font = "11px 'Segoe UI'";
  for (let c = 0; c < numClasses; c++) {
    ctxDecision.fillStyle = getClassColor(c, 1.0);
    ctxDecision.fillRect(legendX, legendY + c * 18, 12, 12);
    ctxDecision.strokeStyle = isLightTheme() ? "rgba(0,0,0,0.2)" : "rgba(255,255,255,0.3)";
    ctxDecision.strokeRect(legendX, legendY + c * 18, 12, 12);
    ctxDecision.fillStyle = isLightTheme() ? "#444" : "#ccc";
    ctxDecision.fillText(`类别 ${c}`, legendX + 18, legendY + c * 18 + 10);
  }

  // 图例：实心=训练集，空心=测试集
  const legendBase = legendY + numClasses * 18 + 8;
  const lgFill = isLightTheme() ? "rgba(0,0,0,0.5)" : "rgba(255,255,255,0.7)";
  const lgStroke = isLightTheme() ? "rgba(0,0,0,0.6)" : "rgba(255,255,255,0.8)";
  ctxDecision.beginPath();
  ctxDecision.arc(legendX + 6, legendBase + 5, 5, 0, Math.PI * 2);
  ctxDecision.fillStyle = lgFill;
  ctxDecision.fill();
  ctxDecision.strokeStyle = lgStroke;
  ctxDecision.lineWidth = 1.5;
  ctxDecision.stroke();
  ctxDecision.fillStyle = isLightTheme() ? "#444" : "#ccc";
  ctxDecision.fillText("训练集", legendX + 18, legendBase + 9);

  ctxDecision.beginPath();
  ctxDecision.arc(legendX + 6, legendBase + 22, 5, 0, Math.PI * 2);
  ctxDecision.strokeStyle = lgStroke;
  ctxDecision.lineWidth = 2;
  ctxDecision.stroke();
  ctxDecision.fillStyle = isLightTheme() ? "#444" : "#ccc";
  ctxDecision.fillText("测试集", legendX + 18, legendBase + 26);
}

// ============================================================
//  网络结构可视化
// ============================================================

const netStructCanvas = document.getElementById("netStructCanvas");
const nsCtx = netStructCanvas.getContext("2d");
const nsTooltip = document.getElementById("netStructTooltip");
let nsData = null;
let nsView = { ox: 0, oy: 0, scale: 1 };
let nsDragging = false;
let nsDragStart = { x: 0, y: 0, ox: 0, oy: 0 };

function resizeNetStructCanvas() {
  const w = netStructCanvas.offsetWidth;
  netStructCanvas.width = w;
  // 高度根据最大神经元数动态调整
  if (nsData) {
    const maxN = Math.max(...nsData.layerSizes);
    netStructCanvas.height = Math.max(280, Math.min(700, maxN * 48 + 120));
  } else {
    netStructCanvas.height = 420;
  }
}

function drawNetStructure() {
  const W = netStructCanvas.width, H = netStructCanvas.height;
  if (W <= 0 || H <= 0 || !nsData) return;
  const { layerSizes, weights } = nsData;
  const L = layerSizes.length;
  const maxNeurons = Math.max(...layerSizes);
  const light = isLightTheme();

  nsCtx.clearRect(0, 0, W, H);

  // ===== 动态布局 =====
  const neuronR = Math.min(20, Math.max(9, (H - 80) / (maxNeurons * 2.1)));
  const vertGap = (H - 80) / Math.max(maxNeurons, 1);  // 统一纵向间距
  const totalWidth = W * 1.0;  // 层间可用宽度
  const layerSpacing = Math.min(180, totalWidth / Math.max(L, 2));
  // 居中偏移
  const centerX = W / 2 - ((L - 1) * layerSpacing) / 2;
  const layerX = (l) => centerX + l * layerSpacing;
  // 每层神经元纵向居中
  const neuronY = (n, count) => {
    const firstY = (H - 80) / 2 - vertGap * (count - 1) / 2 + 40;
    return firstY + n * vertGap;
  };

  nsCtx.save();
  const cx = W / 2, cy = H / 2;
  nsCtx.translate(cx, cy);
  nsCtx.scale(nsView.scale, nsView.scale);
  nsCtx.translate(-cx + nsView.ox, -cy + nsView.oy);

  // 计算神经元坐标
  const neuronPos = [];
  for (let l = 0; l < L; l++) {
    const cols = [];
    for (let n = 0; n < layerSizes[l]; n++) {
      cols.push({ x: layerX(l), y: neuronY(n, layerSizes[l]) });
    }
    neuronPos.push(cols);
  }

  // 构建连线数据
  const connData = [];
  for (let l = 1; l < L; l++) {
    for (let ni = 0; ni < layerSizes[l - 1]; ni++) {
      for (let nj = 0; nj < layerSizes[l]; nj++) {
        const w = weights[l - 1] && weights[l - 1][nj] ? weights[l - 1][nj].weights[ni] : 0;
        connData.push({
          fromL: l - 1, fromN: ni,
          toL: l, toN: nj, weight: w,
          x1: neuronPos[l - 1][ni].x, y1: neuronPos[l - 1][ni].y,
          x2: neuronPos[l][nj].x,    y2: neuronPos[l][nj].y
        });
      }
    }
  }

  // 绘制连线 — 兼容亮暗色模式
  const maxAbsW = Math.max(0.001, ...connData.map(c => Math.abs(c.weight)));
  const minLW = 0.4, maxLW = 4.5;
  for (const c of connData) {
    const absW = Math.abs(c.weight);
    const alpha = light
      ? 0.22 + (absW / maxAbsW) * 0.50   // 亮色：蓝/红
      : 0.35 + (absW / maxAbsW) * 0.45;  // 暗色：白色，提高最低可见度
    if (light) {
      // 亮色模式：黑色，通过透明度体现权重强弱
      nsCtx.strokeStyle = `rgba(0,0,0,${alpha.toFixed(2)})`;
    } else {
      // 暗色模式：白色，通过透明度体现权重强弱
      nsCtx.strokeStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
    }
    nsCtx.lineWidth = minLW + (absW / maxAbsW) * (maxLW - minLW);
    nsCtx.beginPath();
    nsCtx.moveTo(c.x1, c.y1);
    nsCtx.lineTo(c.x2, c.y2);
    nsCtx.stroke();
  }

  // 绘制神经元
  for (let l = 0; l < L; l++) {
    for (let n = 0; n < layerSizes[l]; n++) {
      const p = neuronPos[l][n];
      let fillClr, borderClr;
      if (l === 0) {
        fillClr = "rgba(88,166,255,0.8)"; borderClr = "rgba(88,166,255,1)";
      } else if (l === L - 1) {
        fillClr = "rgba(255,159,67,0.8)"; borderClr = "rgba(255,159,67,1)";
      } else {
        fillClr = "rgba(167,139,250,0.75)"; borderClr = "rgba(167,139,250,1)";
      }
      nsCtx.beginPath();
      nsCtx.arc(p.x, p.y, neuronR, 0, Math.PI * 2);
      nsCtx.fillStyle = fillClr;
      nsCtx.fill();
      nsCtx.strokeStyle = borderClr;
      nsCtx.lineWidth = 1.8;
      nsCtx.stroke();

      // bias 内圈
      if (l > 0 && weights[l - 1] && weights[l - 1][n]) {
        const bv = weights[l - 1][n].bias;
        const ba = 0.25 + Math.min(0.55, Math.abs(bv) * 0.8);
        nsCtx.beginPath();
        nsCtx.arc(p.x, p.y, neuronR * 0.45, 0, Math.PI * 2);
        nsCtx.fillStyle = bv >= 0
          ? `rgba(88,200,120,${ba.toFixed(2)})`
          : `rgba(255,100,100,${ba.toFixed(2)})`;
        nsCtx.fill();
      }
    }
  }

  // 层标签
  nsCtx.fillStyle = light ? "#777" : "#888";
  nsCtx.font = "11px 'Segoe UI','PingFang SC',sans-serif";
  nsCtx.textAlign = "center";
  const arch = nsData.architecture || "mlp";
  const archNames = { cnn: "CNN 特征图", rnn: "RNN 隐状态", attention: "Attn 嵌入" };
  for (let l = 0; l < L; l++) {
    const x = layerX(l);
    const count = layerSizes[l];
    const labelY = neuronY(0, count) - neuronR * 2.8;
    let label;
    if (l === 0) label = (arch !== "mlp") ? (archNames[arch] || "特征层") : "输入层";
    else if (l === L - 1) label = "输出层";
    else label = "隐藏层 " + l;
    nsCtx.fillText(label, x, labelY);
    nsCtx.fillText(layerSizes[l] + "", x, labelY + 14);
  }
  nsCtx.textAlign = "start";
  nsCtx.restore();

  nsData.neuronPos = neuronPos;
  nsData.connData = connData;
}

// 屏幕→世界坐标
function nsScrToWorld(sx, sy) {
  const W = netStructCanvas.width, H = netStructCanvas.height;
  const cx = W / 2, cy = H / 2;
  return {
    x: (sx - cx) / nsView.scale + cx - nsView.ox,
    y: (sy - cy) / nsView.scale + cy - nsView.oy
  };
}

// 拖拽平移
netStructCanvas.addEventListener("mousedown", (e) => {
  nsDragging = true;
  nsDragStart = { x: e.offsetX, y: e.offsetY, ox: nsView.ox, oy: nsView.oy };
  netStructCanvas.style.cursor = "grabbing";
});

netStructCanvas.addEventListener("mousemove", (e) => {
  const mx = e.offsetX, my = e.offsetY;
  if (nsDragging) {
    nsView.ox = nsDragStart.ox + (mx - nsDragStart.x);
    nsView.oy = nsDragStart.oy + (my - nsDragStart.y);
    drawNetStructure();
    nsTooltip.style.opacity = "0";
    return;
  }
  if (!nsData || !nsData.neuronPos) return;
  const w = nsScrToWorld(mx, my);

  // 仅检测神经元悬停（不在连线上显示）
  let bestN = null, bestNd = 22;
  for (let l = 0; l < nsData.layerSizes.length; l++) {
    for (let n = 0; n < nsData.layerSizes[l]; n++) {
      const p = nsData.neuronPos[l][n];
      const d = Math.hypot(w.x - p.x, w.y - p.y);
      if (d < bestNd) { bestNd = d; bestN = { l, n }; }
    }
  }
  if (bestN && bestN.l > 0 && bestN.l - 1 < nsData.weights.length) {
    const isOut = bestN.l === nsData.layerSizes.length - 1;
    const isHid = !isOut;
    // 如果该神经元数据不存在则使用默认值
    const nd = nsData.weights[bestN.l - 1] && nsData.weights[bestN.l - 1][bestN.n]
      ? nsData.weights[bestN.l - 1][bestN.n] : { bias: 0, weights: [] };
    let html = `<b>${isHid ? "隐藏" : "输出"}层</b> 神经元 #${bestN.n}`;
    html += `<br>偏置 b: ${nd.bias >= 0 ? "+" : ""}${(nd.bias ?? 0).toFixed(6)}`;
    html += `<br>入边权重: `;
    if (nd.weights.length === 0) {
      html += "(无)";
    } else {
      nd.weights.forEach((wv, i) => {
        html += `${wv >= 0 ? "+" : ""}${(wv ?? 0).toFixed(4)}${i < nd.weights.length - 1 ? ", " : ""}`;
      });
    }
    nsTooltip.innerHTML = html;
    const cx = e.clientX, cy = e.clientY;
    nsTooltip.style.left = "0px";
    nsTooltip.style.top = "0px";
    nsTooltip.style.opacity = "1";
    const tr = nsTooltip.getBoundingClientRect();
    const gap = 6;
    let left = cx - tr.width / 2;
    let top  = cy - tr.height - gap;
    if (top < 4) top = cy + gap;
    if (left < 4) left = 4;
    if (left + tr.width > window.innerWidth - 4) left = window.innerWidth - tr.width - 4;
    if (top + tr.height > window.innerHeight - 4) top = window.innerHeight - tr.height - 4;
    nsTooltip.style.left = left + "px";
    nsTooltip.style.top = top + "px";
  } else {
    nsTooltip.style.opacity = "0";
  }
});

netStructCanvas.addEventListener("mouseup", () => {
  nsDragging = false;
  netStructCanvas.style.cursor = "grab";
});
netStructCanvas.addEventListener("mouseleave", () => {
  nsDragging = false;
  nsTooltip.style.opacity = "0";
  netStructCanvas.style.cursor = "grab";
});

// 滚动时隐藏 tooltip，避免位置漂移
window.addEventListener("scroll", () => {
  nsTooltip.style.opacity = "0";
}, { passive: true });

// 触摸支持（仅拖拽）
netStructCanvas.addEventListener("touchstart", (e) => {
  if (e.touches.length === 1) {
    nsDragging = true;
    nsDragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, ox: nsView.ox, oy: nsView.oy };
  }
}, { passive: false });

netStructCanvas.addEventListener("touchmove", (e) => {
  if (nsDragging && e.touches.length === 1) {
    e.preventDefault();
    nsView.ox = nsDragStart.ox + (e.touches[0].clientX - nsDragStart.x);
    nsView.oy = nsDragStart.oy + (e.touches[0].clientY - nsDragStart.y);
    drawNetStructure();
  }
}, { passive: false });

netStructCanvas.addEventListener("touchend", () => {
  nsDragging = false;
});

// 外部调用：训练完成后显示网络结构
function showNetStructure(layerSizes, weights) {
  const arch = getArchitectureType();
  const names = { mlp: "MLP 全连接", cnn: "CNN 一维卷积", rnn: "RNN 循环网络", attention: "Attention 自注意力" };
  document.getElementById("netStructTitle").textContent = `🔗 网络结构 (${names[arch] || arch})`;

  nsData = {
    layerSizes: [...layerSizes],
    weights: JSON.parse(JSON.stringify(weights)),
    architecture: arch,
  };
  nsView = { ox: 0, oy: 0, scale: 1 };
  document.getElementById("netStructPanel").style.display = "block";
  resizeNetStructCanvas();
  drawNetStructure();
}

// ===== 训练按钮 =====
trainBtn.addEventListener("click", async () => {
  if (isTraining) return;
  isTraining = true;

  // 根据输入设置随机种子
  setRngFromSeed();

  inferResult.textContent = "";
  progressFill.style.width = "0%";
  progressText.textContent = "0%";
  lossHistory = [];
  accHistory = [];
  testLossHistory = [];
  lastTestData = null;

  trainBtn.disabled = true;
  statusEl.textContent = "准备训练...";
  clearLossChart();

  // 隐藏旧的结果面板
  document.getElementById("confusionPanel").style.display = "none";
  document.getElementById("decisionBoundaryPanel").style.display = "none";
  document.getElementById("netStructPanel").style.display = "none";
  nsData = null;
  decisionBoundaryData = null;
  resizeDecisionCanvas();
  ctxDecision.clearRect(0, 0, decisionCanvas.width, decisionCanvas.height);
  document.getElementById("decisionMsg").textContent =
    "仅适用于输入维度为 2 的分类任务。训练完成后将自动绘制决策边界。";

  const layerSizes   = getLayerSizes();
  const allRawData   = getAllRawData();
  const lr           = parseFloat(document.getElementById("lr").value);
  const epochs       = parseInt(document.getElementById("epochs").value);
  const batchSize    = parseInt(document.getElementById("batchSize").value) || 16;
  const activation   = document.getElementById("activation").value;
  const networkType  = document.getElementById("networkType").value;
  const dropoutRate  = useDropoutCb.checked ? parseFloat(document.getElementById("dropoutRate").value) : 0;
  const l2Lambda     = useL2Cb.checked ? parseFloat(document.getElementById("l2Lambda").value) : 0;
  const useTest      = useTestSetCb.checked;
  const testRatio    = parseFloat(document.getElementById("testRatio").value) || 0.2;
  const optimizer    = document.getElementById("optimizer").value;

  const n  = parseInt(document.getElementById("inputSize").value) || 1;
  const out = parseInt(document.getElementById("outputSize").value) || 1;

  if (allRawData.length === 0) {
    statusEl.textContent = "⚠️ 请先添加训练数据";
    trainBtn.disabled = false;
    isTraining = false;
    return;
  }

  // 划分训练集 / 测试集
  let trainData, testData;
  if (useTest) {
    const split = splitTrainTest(allRawData, testRatio);
    trainData = split.trainSet;
    testData  = split.testSet;
    lastTestData = testData;
    statusEl.textContent = `数据划分: 训练 ${trainData.length} 样本, 测试 ${testData.length} 样本`;
  } else {
    trainData = allRawData.map(r => [r.slice(0, n), r.slice(n, n + out)]);
    testData = [];
    lastTestData = [];
  }

  // 分类网络：检查 one-hot
  if (networkType === "classification") {
    const outSize = layerSizes[layerSizes.length - 1];
    const hasOneHot = trainData.every(([, y]) => {
      return y.length === outSize && y.every(v => v === 0 || v === 1) && y.reduce((a,b)=>a+b,0) === 1;
    });
    if (!hasOneHot) {
      statusEl.textContent = "⚠️ 分类网络要求输出为 One-Hot 编码（如 [1,0,0]）";
      trainBtn.disabled = false;
      isTraining = false;
      return;
    }
  }

  await new Promise(r => setTimeout(r, 50));

  statusEl.textContent = "训练中...";
  hideChartPlaceholder();

  const inputSize = parseInt(document.getElementById("inputSize").value) || 1;
  archInit(inputSize);  // 初始化架构（CNN/RNN/Attention）权重

  const net = buildNetwork(layerSizes);
  const startTime = performance.now();

  const results = train(net, trainData, testData, epochs, lr, batchSize, activation, networkType, dropoutRate, l2Lambda, optimizer, (epoch, loss, testLoss, accInfo) => {
    const pct = Math.min(100, Math.round(epoch / epochs * 100));
    progressFill.style.width = pct + "%";
    const lossLabel = networkType === "classification" ? "CE" : "MSE";
    let text = `${pct}%  (Epoch ${epoch}/${epochs}, Train ${lossLabel}: ${loss.toFixed(6)}`;
    if (testLoss !== undefined && testLoss !== null) {
      text += `, Test ${lossLabel}: ${testLoss.toFixed(6)}`;
    }
    text += `)${accInfo || ""}`;
    progressText.textContent = text;
    statusEl.textContent = `训练中... Epoch ${epoch}`;
  });

  const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);

  currentWeights = extractWeights(net);
  lossHistory    = results.losses;
  testLossHistory= results.testLosses;
  accHistory     = results.accuracies;

  statusEl.textContent = `✅ 训练完成！耗时 ${elapsed}s，Final Loss: ${results.losses[results.losses.length - 1].toFixed(10)}` +
    (results.accuracies.length > 0 && results.accuracies[results.accuracies.length-1] !== null
      ? `，Test Acc: ${(results.accuracies[results.accuracies.length-1]*100).toFixed(1)}%`
      : "");
  trainBtn.disabled = false;
  isTraining = false;

  drawLossChart(results.losses, results.testLosses, results.accuracies, networkType);

  // ===== 分类任务：显示混淆矩阵 + 决策边界 =====
  if (networkType === "classification") {
    const numClasses = out;
    if (testData.length > 0) {
      const cm = computeConfusionMatrix(net, testData, networkType, activation, numClasses);
      renderConfusionMatrix(cm.matrix, numClasses);
      document.getElementById("confusionPanel").style.display = "block";
    }

    // 如果输入维度为 2，显示决策边界面板
    if (n === 2) {
      document.getElementById("decisionBoundaryPanel").style.display = "block";
      // 保存参数以便 resize 时重绘，并用 rAF 确保 DOM 布局完成后再绘制
      decisionBoundaryData = { net, trainData, testData, activation, networkType, numClasses };
      requestAnimationFrame(() => {
        drawDecisionBoundary(net, trainData, testData, activation, networkType, numClasses);
      });
      document.getElementById("decisionMsg").textContent =
        "✅ 决策边界已自动绘制。背景色 = 模型预测类别，实心圆 = 训练集，空心圆 = 测试集。";
    }
  }

  // 显示网络结构可视化
  showNetStructure(layerSizes, currentWeights);
});

// ===== 收集全部训练数据（带 raw 值） =====
function getAllTrainData() {
  const n  = parseInt(document.getElementById("inputSize").value) || 1;
  const out = parseInt(document.getElementById("outputSize").value) || 1;
  const data = [];
  dataBody.querySelectorAll("tr").forEach(tr => {
    const vals = [];
    tr.querySelectorAll("input").forEach(inp => vals.push(parseFloat(inp.value) || 0));
    if (vals.length === n + out) {
      data.push(vals);
    }
  });
  return data;
}

function setAllTrainData(rawData, inputSize, outputSize) {
  dataBody.innerHTML = "";
  document.getElementById("inputSize").value = inputSize;
  document.getElementById("outputSize").value = outputSize;
  syncInputSize();
  for (const row of rawData) addDataRow(row);
  updateInputOutputLock();
}

// ===== 构建模型 JSON =====
function buildModelJSON() {
  const seedEl = document.getElementById("randomSeed");
  const seedVal = seedEl && seedEl.value !== "" && seedEl.value !== null ? parseInt(seedEl.value, 10) : undefined;
  const arch = getArchitectureType();
  const inputSize = parseInt(document.getElementById("inputSize").value) || 1;
  const archCfg = arch !== "mlp" ? {
    architecture: arch,
    inputSize: inputSize,
    cnnKernel: arch === "cnn" ? (parseInt(document.getElementById("cnnKernel").value) || 3) : undefined,
    cnnFilters: arch === "cnn" ? (parseInt(document.getElementById("cnnFilters").value) || 8) : undefined,
    rnnHidden: arch === "rnn" ? (parseInt(document.getElementById("rnnHidden").value) || 8) : undefined,
    attnEmbed: arch === "attention" ? (parseInt(document.getElementById("attnEmbed").value) || 16) : undefined,
    attnHeads: arch === "attention" ? (parseInt(document.getElementById("attnHeads").value) || 2) : undefined,
  } : undefined;
  return {
    version: 6,
    savedAt: new Date().toISOString(),
    config: {
      layerSizes: getLayerSizes(),
      rawLayerSizes: getRawLayerSizes(),
      lr: parseFloat(document.getElementById("lr").value),
      epochs: parseInt(document.getElementById("epochs").value),
      batchSize: parseInt(document.getElementById("batchSize").value) || 16,
      activation: document.getElementById("activation").value,
      networkType: document.getElementById("networkType").value,
      optimizer: document.getElementById("optimizer").value,
      useEarlyStop: document.getElementById("useEarlyStop").checked,
      useDropout: useDropoutCb.checked,
      dropoutRate: useDropoutCb.checked ? parseFloat(document.getElementById("dropoutRate").value) : undefined,
      useL2: useL2Cb.checked,
      l2Lambda: useL2Cb.checked ? parseFloat(document.getElementById("l2Lambda").value) : undefined,
      useTestSet: useTestSetCb.checked,
      testRatio: useTestSetCb.checked ? parseFloat(document.getElementById("testRatio").value) : undefined,
      useGPU: useGPU,
      randomSeed: seedVal,
      archConfig: archCfg,
    },
    weights: currentWeights,
    archWeights: arch !== "mlp" ? archParams : undefined,
    trainData: getAllTrainData(),
    lossHistory: lossHistory,
    testLossHistory: testLossHistory,
    accHistory: accHistory,
  };
}

function restoreFromModelJSON(parsed) {
  const cfg = parsed.config;
  document.getElementById("lr").value = cfg.lr;
  document.getElementById("epochs").value = cfg.epochs;
  document.getElementById("batchSize").value = cfg.batchSize || 16;
  document.getElementById("activation").value = cfg.activation;
  document.getElementById("networkType").value = cfg.networkType || "regression";
  document.getElementById("optimizer").value = cfg.optimizer || "adam";
  useDropoutCb.checked = cfg.useDropout || false;
  dropoutField.style.display = useDropoutCb.checked ? "block" : "none";
  if (cfg.dropoutRate !== undefined) document.getElementById("dropoutRate").value = cfg.dropoutRate;
  useL2Cb.checked = cfg.useL2 || false;
  l2Field.style.display = useL2Cb.checked ? "block" : "none";
  if (cfg.l2Lambda !== undefined) document.getElementById("l2Lambda").value = cfg.l2Lambda;
  useTestSetCb.checked = cfg.useTestSet || false;
  testRatioField.style.display = useTestSetCb.checked ? "block" : "none";
  if (cfg.testRatio !== undefined) document.getElementById("testRatio").value = cfg.testRatio;

  // 恢复 GPU 设置
  if (cfg.useGPU !== undefined) {
    useGPU = cfg.useGPU;
    localStorage.setItem("nn_useGPU", useGPU);
    useGPUCb.checked = useGPU;
  }

  // 恢复早停设置
  if (cfg.useEarlyStop !== undefined) {
    document.getElementById("useEarlyStop").checked = cfg.useEarlyStop;
  }

  // 恢复随机种子
  const seedEl = document.getElementById("randomSeed");
  if (seedEl) {
    seedEl.value = cfg.randomSeed !== undefined ? cfg.randomSeed : "";
  }

  // 恢复架构配置
  const archCfg = cfg.archConfig;
  if (archCfg && archCfg.architecture && archCfg.architecture !== "mlp") {
    document.getElementById("architecture").value = archCfg.architecture;
    document.getElementById("architecture").dispatchEvent(new Event("change"));
    if (archCfg.cnnKernel !== undefined) document.getElementById("cnnKernel").value = archCfg.cnnKernel;
    if (archCfg.cnnFilters !== undefined) document.getElementById("cnnFilters").value = archCfg.cnnFilters;
    if (archCfg.rnnHidden !== undefined) document.getElementById("rnnHidden").value = archCfg.rnnHidden;
    if (archCfg.attnEmbed !== undefined) document.getElementById("attnEmbed").value = archCfg.attnEmbed;
    if (archCfg.attnHeads !== undefined) document.getElementById("attnHeads").value = archCfg.attnHeads;
    // 恢复架构权重
    if (parsed.archWeights) {
      archParams = parsed.archWeights;
    } else {
      archInit(archCfg.inputSize || 1);
    }
  } else {
    document.getElementById("architecture").value = "mlp";
    document.getElementById("architecture").dispatchEvent(new Event("change"));
    archParams = null;
  }

  const layerSizes = cfg.layerSizes;
  const net = buildNetwork(layerSizes);

  // v4→v5 权重格式迁移：旧格式按源层索引 → 新格式按目标层索引
  if (!parsed.version || parsed.version < 5) {
    parsed.weights = convertWeightsV4toV5(parsed.weights, layerSizes);
  }

  applyWeights(net, parsed.weights);
  currentWeights = extractWeights(net);

  const existingLayers = layerConfig.querySelectorAll("[data-layer]");
  const targetHiddenCount = layerSizes.length - 2;
  for (let i = existingLayers.length - 1; i >= targetHiddenCount; i--) {
    existingLayers[i].remove();
  }
  for (let i = existingLayers.length; i < targetHiddenCount; i++) {
    document.getElementById("addLayerBtn").click();
  }
  layerConfig.querySelectorAll("[data-layer] input").forEach((inp, i) => {
    inp.value = layerSizes[i + 1];
  });

  // 使用原始输入/输出维度恢复数据（非MLP架构的layerSizes[0]是特征维度）
  const rawLayerSizes = cfg.rawLayerSizes || [layerSizes[0], layerSizes[layerSizes.length - 1]];
  const restoreInputSize = rawLayerSizes[0];
  const restoreOutputSize = rawLayerSizes[rawLayerSizes.length - 1] || layerSizes[layerSizes.length - 1];

  if (parsed.trainData && parsed.trainData.length > 0) {
    setAllTrainData(parsed.trainData, restoreInputSize, restoreOutputSize);
  }

  if (parsed.lossHistory && parsed.lossHistory.length > 0) {
    lossHistory = parsed.lossHistory;
    testLossHistory = parsed.testLossHistory || [];
    accHistory = parsed.accHistory || [];
    hideChartPlaceholder();
    drawLossChart(lossHistory, testLossHistory, accHistory, cfg.networkType || "regression");
  }

  // 恢复混淆矩阵（如果有测试数据）
  if (cfg.networkType === "classification" && parsed.trainData) {
    const n = restoreInputSize;
    const out = restoreOutputSize;
    if (allRaw.length > 0 && useTestSetCb.checked) {
      const split = splitTrainTest(allRaw, parseFloat(document.getElementById("testRatio").value) || 0.2);
      if (split.testSet.length > 0) {
        const cm = computeConfusionMatrix(net, split.testSet, cfg.networkType, cfg.activation, out);
        renderConfusionMatrix(cm.matrix, out);
        document.getElementById("confusionPanel").style.display = "block";
      }
      if (n === 2) {
        document.getElementById("decisionBoundaryPanel").style.display = "block";
        decisionBoundaryData = { net, trainData: split.trainSet, testData: split.testSet, activation: cfg.activation, networkType: cfg.networkType, numClasses: out };
        requestAnimationFrame(() => {
          drawDecisionBoundary(net, split.trainSet, split.testSet, cfg.activation, cfg.networkType, out);
        });
      }
    }
  }

  // 显示网络结构可视化
  showNetStructure(layerSizes, parsed.weights);

  syncInputSize();
  rebuildInferInputs();
  updateInputOutputLock();
}

// ===== 保存 / 加载 =====
document.getElementById("saveBtn").addEventListener("click", () => {
  if (!currentWeights) { statusEl.textContent = "⚠️ 没有可保存的模型，请先训练"; return; }
  const model = buildModelJSON();
  const jsonStr = JSON.stringify(model, null, 2);
  const blob = new Blob([jsonStr], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const ts = new Date();
  const tsStr = `${ts.getFullYear()}${String(ts.getMonth()+1).padStart(2,"0")}${String(ts.getDate()).padStart(2,"0")}_${String(ts.getHours()).padStart(2,"0")}${String(ts.getMinutes()).padStart(2,"0")}${String(ts.getSeconds()).padStart(2,"0")}`;
  const filename = `nn-model_${tsStr}.json`;
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  statusEl.textContent = `✅ 模型已保存为 ${filename}`;
});

document.getElementById("loadBtn").addEventListener("click", () => {
  const fileInput = document.createElement("input");
  fileInput.type = "file"; fileInput.accept = ".json,application/json";
  fileInput.onchange = () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = JSON.parse(e.target.result);
        if (!parsed.config || !parsed.weights || !Array.isArray(parsed.config.layerSizes)) {
          statusEl.textContent = "⚠️ 文件格式不正确";
          return;
        }
        restoreFromModelJSON(parsed);
        statusEl.textContent = `✅ 模型已加载 — ${file.name}` +
          (parsed.savedAt ? `（保存于 ${new Date(parsed.savedAt).toLocaleString("zh-CN")}）` : "");
      } catch { statusEl.textContent = "⚠️ 文件解析失败"; }
    };
    reader.readAsText(file);
  };
  fileInput.click();
});

// ===== 推理 =====
document.getElementById("inferBtn").addEventListener("click", () => {
  if (!currentWeights) { inferResult.textContent = "⚠️ 请先训练网络"; return; }
  const inputs = [];
  document.getElementById("inferBody").querySelectorAll("input").forEach(el => {
    inputs.push(parseFloat(el.value) || 0);
  });
  const layerSizes = getLayerSizes();
  const activation = document.getElementById("activation").value;
  const networkType = document.getElementById("networkType").value;
  const net = buildNetwork(layerSizes);
  applyWeights(net, currentWeights);
  const output = forward(net, archForward(inputs), activation, false, networkType, null);

  if (networkType === "classification") {
    let html = `<table class="class-result-table"><thead><tr><th>类别</th><th>概率</th></tr></thead><tbody>`;
    let maxIdx = 0;
    for (let i = 0; i < output.length; i++) {
      if (output[i] > output[maxIdx]) maxIdx = i;
      html += `<tr><td>类别 ${i}</td><td>${output[i].toFixed(8)}</td></tr>`;
    }
    html += `</tbody></table>`;
    html += `<br>🎯 预测类别: <b>类别 ${maxIdx}</b>（概率 ${output[maxIdx].toFixed(8)}）`;
    inferResult.innerHTML = html;
  } else {
    inferResult.innerHTML = `🎯 预测输出: [${output.map(v => v.toFixed(8)).join(", ")}]`;
  }
});

// ===== 右侧列高度同步 =====
function syncRightColHeight() {
  const leftCol = document.querySelector('.layout > div:first-child');
  const rightCol = document.querySelector('.right-col');
  if (!leftCol || !rightCol) return;
  const leftH = leftCol.offsetHeight;
  rightCol.style.minHeight = leftH + 'px';
}
window.addEventListener('load', () => {
  syncRightColHeight();
  window.addEventListener('resize', syncRightColHeight);
  const rc = document.querySelector('.right-col');
  if (rc) {
    new MutationObserver(syncRightColHeight).observe(rc, { childList: true, subtree: true });
  }
});

// ===== 初始图表 =====
(function() {
  const gridClr2 = isLightTheme() ? "rgba(0,0,0,0.04)" : "rgba(255,255,255,0.06)";
  const ctx = document.getElementById("lossChart").getContext("2d");
  lossChart = new Chart(ctx, {
    type: "line",
    data: { labels: [], datasets: [{ label: "Loss", data: [], borderColor: "#58a6ff", backgroundColor: "rgba(88,166,255,0.08)", fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2 }] },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { display: false, grid: { color: gridClr2 }, border: { display: false } },
        y: { display: false, grid: { color: gridClr2 }, border: { display: false } }
      }
    }
  });
  showChartPlaceholder();
})();

function showChartPlaceholder() {
  const el = document.getElementById("chartPlaceholder");
  if (el) el.classList.remove("hidden");
}
function hideChartPlaceholder() {
  const el = document.getElementById("chartPlaceholder");
  if (el) el.classList.add("hidden");
}
function clearLossChart() {
  if (lossChart) { lossChart.destroy(); lossChart = null; }
  showChartPlaceholder();
}

</script>
